<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | RAIS GLOBAL</title>
    <style>
        :root {
            --bg-dark: #0a0e17; /* Matches your current background */
            --card-bg: #161b22;
            --text-main: #ffffff;
            --noon-yellow: #feee00;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(17 24 39 / var(--tw-bg-opacity, 1));
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .product-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: rgb(17 24 39 / var(--tw-bg-opacity, 1));
            max-width: 400px;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            border: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-10px);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background: #21262d; /* Placeholder color */
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
            flex-grow: 1;
        }

        .product-category {
            font-size: 0.8rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .product-title {
            font-size: 1.25rem;
            margin: 10px 0;
        }

        .btn-noon {
            display: block;
            background-color: var(--noon-yellow);
            color: #000;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            margin-top: 15px;
            transition: opacity 0.2s;
        }

        .btn-noon:hover {
            opacity: 0.9;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 50px;
            color: #8b949e;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Premium Essentials</h1>
        <p>Powered by RAIS GLOBAL</p>
    </div>

    <div class="product-grid">
        
        <div class="product-card">
            <img src="double-sided-tape.jpg" alt="Double side tape" class="product-image">
            <div class="product-info">
                <span class="product-category">Home Improvement</span>
                <h2 class="product-title">2-Pack Nano Double sided mounting tape</h2>
                <p>Experience the quality of RAIS GLOBAL.</p>
                <a href="https://www.noon.com/en-ae/Z1F0DEABF25FAE2CB3AA2Z/p" class="btn-noon">View on Noon</a>
            </div>
        </div>
